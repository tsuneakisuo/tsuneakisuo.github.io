<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ne peut pas partir</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:serif;
background:#f7f4ef;
color:#222;
line-height:1.9;
overflow-x:hidden;
}

/* ---------------- */
/* Navigation */
/* ---------------- */

nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.25);
backdrop-filter:blur(8px);
z-index:1000;
}

.logo{
color:white;
text-decoration:none;
font-size:1.2rem;
letter-spacing:1px;
}

.menu{
display:flex;
gap:25px;
}

.menu a{
color:white;
text-decoration:none;
transition:.3s;
}

.menu a:hover{
opacity:.7;
}

/* ---------------- */
/* Hero */
/* ---------------- */

.hero{
position:relative;
height:100vh;
overflow:hidden;
}

/* 最初の静止画 */

.hero-image{

position:absolute;
inset:0;

background-image:url("nepeutpaspartir-workshop-hero.png");
background-size:cover;
background-position:center;

animation:fadeOut 3s forwards;

z-index:-1;
}

/* 動画 */

.hero video{

position:absolute;

top:50%;
left:50%;

min-width:100%;
min-height:100%;

transform:translate(-50%,-50%);

object-fit:cover;

opacity:0;

animation:fadeIn 3s forwards;
animation-delay:2.5s;

z-index:-2;
}

/* オーバーレイ */

.overlay{

position:absolute;
inset:0;

background:
linear-gradient(
rgba(0,0,0,.25),
rgba(0,0,0,.55)
);

z-index:0;
}

@keyframes fadeOut{

0%{
opacity:1;
}

100%{
opacity:0;
}

}

@keyframes fadeIn{

0%{
opacity:0;
}

100%{
opacity:1;
}

}

/* ---------------- */
/* Hero Text */
/* ---------------- */

.hero-content{

position:absolute;

left:8%;
bottom:12%;

color:white;

max-width:800px;

z-index:10;

}

.hero-content h1{

font-size:5rem;
font-weight:normal;

margin-bottom:25px;

}

.hero-content p{

font-size:1.4rem;
line-height:1.8;

}

/* ---------------- */
/* Content */
/* ---------------- */

.section{

max-width:900px;
margin:auto;

padding:120px 30px;

}

.section h2{

font-size:2rem;
font-weight:normal;

margin-bottom:40px;

}

.section p{

margin-bottom:25px;

}

.quote{

margin:60px 0;

padding:40px;

background:white;

border-left:4px solid #444;

font-size:1.2rem;

}

.links{

display:flex;
gap:20px;
flex-wrap:wrap;

margin-top:40px;

}

.btn{

display:inline-block;

padding:14px 28px;

border:1px solid #222;

text-decoration:none;

color:#222;

transition:.3s;

}

.btn:hover{

background:#222;
color:white;

}

/* ---------------- */
/* Footer */
/* ---------------- */

footer{

background:#111;
color:#aaa;

text-align:center;

padding:60px;

}

/* ---------------- */
/* Mobile */
/* ---------------- */

@media(max-width:768px){

.hero-content h1{
font-size:3rem;
}

.hero-content p{
font-size:1.1rem;
}

.menu{
display:none;
}

.section{
padding:80px 25px;
}

.quote{
padding:30px;
font-size:1.05rem;
}

}

</style>

</head>

<body>

<nav>

<a class="logo" href="index.html">
Ne peut pas partir
</a>

<div class="menu">

<a href="profile.html">Profile</a>

<a href="journal.html">Journal</a>

<a href="contact.html">Contact</a>

</div>

</nav>

<section class="hero">

<div class="hero-image"></div>

<video autoplay muted loop playsinline>

<source src="hero.mp4" type="video/mp4">

</video>

<div class="overlay"></div>

<div class="hero-content">

<h1>Ne peut pas partir</h1>

<p>

ものを作ることは、<br>
形を作ることではない。<br><br>

人の時間や記憶に寄り添うことだと思っている。

</p>

</div>

</section>

<section class="section">

<h2>京都・綾部の工房から</h2>

<p>

一足ずつ手製靴を制作しています。

</p>

<div class="quote">

履くためだけの靴ではない。<br><br>

その人の時間に寄り添う靴。

</div>

<div class="links">

<a class="btn" href="profile.html">
Profile
</a>

<a class="btn" href="journal.html">
Journal
</a>

<a class="btn" href="contact.html">
Contact
</a>

</div>

</section>

<footer>

© Ne peut pas partir

</footer>

</body>

</html>
